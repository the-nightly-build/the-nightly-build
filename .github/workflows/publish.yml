# The press run: on every push to library, rebuild the site and deploy Pages.
# SECURITY: executable logic (builder, assets) is ALWAYS checked out from main
# (§1 invariant 1). Library content is data, never code.
# The built site is served from the Pages artifact; it is NOT committed back to
# the library branch, so a protected library never blocks the deploy.
# PLACEMENT: GitHub fires push triggers only from workflow files present on the
# pushed branch, so setup.sh seeds a copy of this file onto library; the editor's
# auto-merge also dispatches it explicitly (GITHUB_TOKEN pushes fire no events).
# Keep this file a pure trigger: all engine logic is checked out from main.
name: nightly-build-publish

on:
  push:
    branches: [library]
  workflow_dispatch:

concurrency:
  group: nightly-build-publish
  cancel-in-progress: true

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout library (content)
        uses: actions/checkout@v4

      - name: Checkout engine + templates from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: _main

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build the site
        run: |
          python3 _main/engine/build_site.py \
            --repo _main --library . --out site \
            --base-url "${{ steps.pages.outputs.base_url }}"

      - uses: actions/upload-pages-artifact@v3
        with: { path: site }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
