# The paperboy: delivers the latest build's email digest every morning.
# Opt-in twice over: press/site.yaml must set email.send_utc_hour, AND the
# MAIL_* secrets must exist. Runs hourly because scheduled workflows live on
# main (engine-space); the user-owned send hour lives in press/site.yaml, so
# changing it never touches an engine file. The digest itself is built by the
# press (site/email-latest.html on the library branch); this workflow only
# gates and sends. When no fresh build exists, engine/duty.py decides whether
# last night was quiet by design (cadence, completion, pause) or a miss.
# Misses get a short quiet-night notice for up to 14 days, so a broken press
# is distinguishable from a resting one. workflow_dispatch = send now.
name: nightly-build-morning-mail

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (press config + engine)
        uses: actions/checkout@v4

      - name: Checkout library (built digest)
        uses: actions/checkout@v4
        with:
          ref: library
          path: _library

      - name: Gate on configured hour, secrets, fresh build or missed night
        id: gate
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          pip install pyyaml --quiet
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          import datetime, json, os, pathlib, subprocess, yaml

          def out(send, why, body="", subject=""):
              print(f"send={'true' if send else 'false'}")
              print(f"why={why}")
              print(f"body={body}")
              print(f"subject={subject}")
              raise SystemExit

          if not os.environ.get("MAIL_TO"):
              out(False, "MAIL_TO secret not set (RSS remains available)")
          force = os.environ.get("FORCE") == "true"
          site = {}
          p = pathlib.Path("press/site.yaml")
          if p.is_file():
              site = yaml.safe_load(p.read_text()) or {}
          title = site.get("title") or "The Nightly Build"
          hour = (site.get("email") or {}).get("send_utc_hour")
          now = datetime.datetime.now(datetime.timezone.utc)
          if not force:
              if hour is None:
                  out(False, "email.send_utc_hour not set in press/site.yaml")
              if int(hour) != now.hour:
                  out(False, f"not the configured hour ({hour}:00 UTC)")
          digest = pathlib.Path("_library/site/email-latest.html")
          if not digest.is_file():
              out(False, "no built digest on library yet")
          try:
              catalog = json.loads(
                  pathlib.Path("_library/site/catalog.json").read_text())
              latest = max(catalog["builds"])
              age = (now.date()
                     - datetime.date.fromisoformat(latest)).days
          except Exception:
              out(False, "catalog unreadable")
          if age <= 1 or force:
              subject = pathlib.Path(
                  "_library/site/email-latest-subject.txt").read_text().strip()
              out(True, f"delivering build {latest}", str(digest), subject)

          # No fresh build. Quiet by design, or a missed night?
          yesterday = (now.date() - datetime.timedelta(days=1)).isoformat()
          try:
              duty = json.loads(subprocess.run(
                  ["python3", "engine/duty.py", "--repo", ".",
                   "--library", "_library", "--date", yesterday],
                  capture_output=True, text=True, check=True).stdout)
          except Exception:
              out(False, "duty check failed; staying quiet")
          if not duty["due"]:
              out(False, f"nothing was due last night (latest build {latest}); "
                         f"quiet by design")
          if age > 14:
              out(False, f"stale {age} days; alert window passed, going silent")
          missed = ", ".join(e["series"] for e in duty["due"])
          q = pathlib.Path("_quiet.html")
          q.write_text(
              f'<div style="font-family:Georgia,serif;max-width:560px;'
              f'margin:0 auto;padding:24px">'
              f'<h2 style="margin:0 0 12px">{title}: the press was quiet '
              f'last night</h2>'
              f'<p style="color:#444444;line-height:1.6">No new build was '
              f'published, but these series were due: <b>{missed}</b>. '
              f'The night shift may have been skipped or may have failed; '
              f'check your schedule and the repo&rsquo;s Actions tab. '
              f'Latest build: {latest} ({age} nights ago).</p></div>\n')
          out(True, "quiet-night notice", str(q), f"Quiet night at {title}")
          EOF

      - name: Send
        if: steps.gate.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SMTP_SERVER }}
          server_port: ${{ secrets.MAIL_SMTP_PORT }}
          username: ${{ secrets.MAIL_SMTP_USERNAME }}
          password: ${{ secrets.MAIL_SMTP_PASSWORD }}
          from: ${{ secrets.MAIL_FROM }}
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.gate.outputs.subject }}
          html_body: file://${{ steps.gate.outputs.body }}
