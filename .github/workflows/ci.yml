# Engine code CI. Lints, type-checks, formats, and tests the engine on main.
# Scoped to main ONLY: this is walled off from the content pipeline (check.yml
# on library) and the user fork flow. It is never seeded onto library.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group figure-capture
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check
      - run: uv run pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prettier --check .
      - run: npx eslint .
      - run: npx stylelint "engine/assets/**/*.css"
      - run: npx markdownlint-cli2
      - run: npm run lint:sg
      - run: npm run test:js

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (preinstalled on ubuntu runners)
        run: shellcheck setup.sh
      - name: shfmt
        run: |
          curl -fsSL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 -o /tmp/shfmt
          chmod +x /tmp/shfmt
          /tmp/shfmt -d setup.sh
