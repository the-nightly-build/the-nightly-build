# The machine contract for the paper template: the geometry engine/check.py
# enforces (PROTOCOL step 2.4 reads it). A guided reconstruction of one research
# paper: the abstract anchor puts the source's link and its own words up front,
# the flex sections carry the reconstruction, and the reading map closes on a
# triage of the original. The primer and the map orient and direct rather than
# claim, so they are cite-exempt; the abstract cites the paper it quotes.
about: "A guided reconstruction of one research paper: its abstract and link up front, the idea rebuilt in this paper's own words anchored by the original's, and a map for reading the source."
class: longread
words: [1800, 3400]
sections: [abstract, before-you-read, orientation, read-it-yourself, sources]
flex_sections: [2, 6]
cite_rule: per-section
cite_exempt: [before-you-read, read-it-yourself]
modes: [collection, sequence, open]
