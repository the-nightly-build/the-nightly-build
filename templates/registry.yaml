# The template registry: the single source of truth for what each template requires.
# Agents read their template's entry (PROTOCOL step 2.3); engine/check.py enforces it.
# Bands are quality calibration (WARN tier), not law. Series may tighten via `words:`
# but never loosen below these floors.

dossier:
  class: longread
  words: [2500, 6000]
  sections: [orientation, foundations, analysis, debate, go-deeper, sources]
  cite_rule: per-section
  modes: [collection, sequence, open]
  furniture: [jump-nav, stat-strip, charts]

lesson:
  class: longread
  words: [1500, 4000]
  sections: [objectives, recap, teach, check, bridge, sources]
  cite_rule: per-section
  modes: [sequence, open]
  furniture: [objectives-box, callouts, self-check, next-bridge]

brief:
  class: shortread
  items: [4, 8]
  sections: [items, sources]
  cite_rule: per-item
  modes: [rolling, open]
  furniture: [tagged-items, why-it-matters]

paper:
  class: shortread
  words: [1200, 2500]
  sections: [abstract, findings, appraisal, verdict, sources]
  cite_rule: per-section
  modes: [collection, rolling, open]
  furniture: [plain-abstract, holds-up-grid, verdict-box]

chronicle:
  class: longread
  words: [2000, 4500]
  sections: [orientation, timeline, echoes, sources]
  cite_rule: per-section
  modes: [sequence, collection, open]
  furniture: [timeline-spine, echoes-today]
