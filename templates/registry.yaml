# The template registry: the single source of truth for what each template requires.
# Agents read their template's entry (PROTOCOL step 2.3); engine/check.py enforces it.
# A template is a citation geometry, not a genre: the `article` template is
# enforced prose (anchors plus agent-named sections, every section cited), the
# `brief` template is enforced structure (tagged items, every item cited).
# Genres live in series prompts.
# Bands are quality calibration (WARN tier), not law. Series may tighten via
# `words:` but never loosen below these floors. Presses add their own
# templates in press/templates/registry.yaml; `flex_sections` is optional
# there too (omit it for a fully fixed outline).

article:
  class: longread
  words: [800, 6000]
  sections: [orientation, go-deeper, sources]
  flex_sections: [2, 6]
  cite_rule: per-section
  modes: [collection, sequence, rolling, open]

brief:
  class: shortread
  items: [4, 8]
  sections: [items, sources]
  cite_rule: per-item
  require_why: true # each item needs a "why it matters" line (data-nb-why)
  modes: [rolling, open]
