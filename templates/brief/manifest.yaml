# The machine contract for the brief template: the geometry engine/check.py
# enforces (PROTOCOL step 2.4 reads it). The `brief` template is enforced structure
# (4-8 tagged items, every item cited, each with a "why it matters" line,
# data-nb-why). In rolling mode the slug and nb-meta date are today's UTC date; on
# an open section you coin a topical slug and set mode "open". Bands calibrate
# quality at the WARN tier. A press adds or redefines templates as folder packages under
# press/templates/<id>/.
about: "A batch of tonight's developments: an itemized nightly roundup, each item a judgment about why something matters."
class: shortread
items: [4, 8]
sections: [items, sources]
cite_rule: per-item
require_why: true # each item needs a "why it matters" line (data-nb-why)
modes: [rolling, open]
chrome:
  - '<body class="nb-article">'
  - "<b>Why it matters</b>:"
  - "<h2>Sources</h2>"
