# The annotated arXiv daily, on the press's own `paper` template. Open mode
# with a commission queue: items publish first, in any order. An empty queue
# means the desk picks tonight's paper itself.
name: The Paper
mode: open
section: "Research"
template: paper
prompt: prompt.md
autopublish: true
strict: false
words: [2000, 3200]
cadence: daily
consult:
  - https://arxiv.org/
# The queue. Add a paper by appending an item. The item-level consult pins it.
items:
  - slug: causal-pts-young-children
    title: "Posttraumatic stress in young children at risk for maltreatment (2026)"
    consult:
      - https://pmc.ncbi.nlm.nih.gov/articles/PMC13143975/
