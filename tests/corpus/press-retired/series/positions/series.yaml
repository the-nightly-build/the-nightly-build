# An open desk that rotates a fixed watchlist. There is no item list because the
# engine does not rotate a collection (a collection publishes each item once and
# completes); an open desk runs forever, and the beat in prompt.md holds the
# rotation. Daily cadence over seven names means each comes up about once a week.
name: Positions
mode: open
section: "Markets"
template: article
prompt: prompt.md
autopublish: true
strict: false
words: [1500, 4000]
min_sources: 8
cadence: daily
# Strict citations: with sources_exclusive, every citation must start with one of
# the consult prefixes below (engine BLOCKs anything else). A curated primary-source
# allowlist for company analysis: filings, the listing venues for the-tape, and each
# name's own investor site for segment/product/earnings detail.
sources_exclusive: true
consult:
  - https://www.sec.gov/               # EDGAR filings — all 7 names (incl. TSM 20-F)
  - https://www.nasdaq.com/            # market data — the-tape
  - https://www.nyse.com/              # market data — the-tape (TSM)
  - https://www.microsoft.com/         # MSFT
  - https://investors.micron.com/      # MU
  - https://investor.nvidia.com/       # NVDA
  - https://investor.tsmc.com/         # TSM
  - https://abc.xyz/                   # Alphabet
  - https://investor.apple.com/        # AAPL
  - https://investors.snowflake.com/   # SNOW
