# A sequence: an ordered course. The night shift reads the published lessons
# before writing the next, and each recap references them concretely. A
# sequence grows by appending items; published lessons never reorder.
name: Transformers from Scratch
mode: sequence
section: "Foundations"
template: article
prompt: prompt.md
autopublish: true
strict: false
words: [1800, 4500] # room to build an idea, show the code, and check it
min_sources: 8
cadence: daily # build the course nightly
items:
  - slug: tokens-and-embeddings
    title: "Tokens and Embeddings: Turning Text into Vectors"
  - slug: self-attention-by-hand
    title: "Self-Attention by Hand: Queries, Keys, and Values"
  - slug: multi-head-attention
    title: "Multi-Head Attention: Many Views of One Sequence"
  - slug: positional-encoding
    title: "Positional Encoding: Giving Order to a Bag of Tokens"
  - slug: the-transformer-block
    title: "The Transformer Block: Attention, MLP, and Residual Stream"
  - slug: training-a-tiny-gpt
    title: "Training a Tiny GPT: From Loss Curve to First Words"
