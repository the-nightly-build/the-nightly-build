  <pre><code class="language-python">def newton_schulz(G, steps: int = 5):
    """Approximate Ortho(G) without an SVD."""
    a, b, c = 3.4445, -4.7750, 2.0315
    X = G / (G.norm() + 1e-7)  # singular values into [0, 1]
    for _ in range(steps):
        A = X @ X.T
        X = a * X + (b * A + c * A @ A) @ X
    return X</code></pre>
