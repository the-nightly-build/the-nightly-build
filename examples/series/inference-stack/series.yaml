    title: "The KV Cache: The Memory Problem Everything Else Solves"
    tags: [hardware]
  - slug: flashattention
    title: "FlashAttention (2022)"
    tags: [hardware, benchmarks]
  - slug: paged-attention
    title: "PagedAttention and vLLM (2023)"
    tags: [hardware]
