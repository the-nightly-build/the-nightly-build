# A collection: items publish front-to-back, one per night at the cadence, until
# the list is done. A canon of the techniques behind modern inference, appraised
# once each. Grow it by appending items. Published appraisals stay put.
name: The Inference Stack
mode: collection
section: "Foundations"
template: article
prompt: prompt.md
autopublish: true
strict: false
words: [1500, 3500] # appraisals stay tight: the technique carries the piece
min_sources: 8
cadence: [sat]
consult:
  # Read the paper or reference implementation before anything written about it.
  - https://arxiv.org/
tags:
  hardware: ../_tags/hardware.md
  benchmarks: ../_tags/benchmarks.md
items:
