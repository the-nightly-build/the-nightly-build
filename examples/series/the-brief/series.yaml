# A rolling series: one article per night, slugged by UTC date. Missed nights
# are skipped, never backfilled. No item list. The date is the item.
name: The Brief
mode: rolling
section: "The Daily"
template: brief
prompt: prompt.md
autopublish: true
strict: false
min_sources: 6
# Composition, not just count: a brief assembled from one day's arXiv listing
# meets any floor. Every item carries the document that owns its claim, plus
# someone with no stake in it reading the same thing.
per_item_sources:
  primary: [1, null]
  secondary: [1, null]
cadence: daily
