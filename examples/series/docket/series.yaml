# An open section: the beat in prompt.md is the assignment. Each article tracks one
# legal matter, chosen by the night shift, on the article template. Its genre is
# carried by a paper-owned furniture piece, the case docket (rs-docket, defined
# in themes/broadsheet.css).
name: Docket
mode: open
section: "AI & the Law"
template: article
prompt: prompt.md
autopublish: true
strict: false
words: [1500, 4000]
min_sources: 8
cadence: [tue, thu]
consult: # must-read starting points, read before researching elsewhere
  - https://www.courtlistener.com/
