# An open section that rotates a fixed watchlist. There is no item list: a
# collection publishes each item once and completes, so it cannot rotate. An
# open section runs forever, and the beat in prompt.md holds the rotation.
# Daily cadence over seven names brings each up about once a week.
name: Positions
mode: open
section: "Markets"
template: article
prompt: prompt.md
autopublish: true
strict: false
words: [1500, 4000]
min_sources: 8
cadence: daily
consult:
  - https://www.sec.gov/
