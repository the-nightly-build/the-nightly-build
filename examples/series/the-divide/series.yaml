# An open section on the custom `divide` template (the package under
# press/templates/divide/). Each article takes ONE genuinely contested question
# and argues every side at its strongest from named, vetted sources. The
# template enforces exactly two sides, each its own section; `strict` promotes
# every WARN to a BLOCK, so the per-side citation checks become hard gates.
# A one-sided or thinly-sourced article cannot publish.
name: The Divide
mode: open
section: "Opinion"
template: divide # a single custom template; open sections may also list `templates:`
prompt: prompt.md
autopublish: true
strict: true # the integrity section runs strict on purpose
min_sources: 10 # both sides, sourced to primaries; aim well past this
cadence: [mon, wed, fri]
