title: "The Nightly Build"
theme: press/themes/newsroom.css # the palette
appearance: auto # auto | light | dark. auto follows the system. The no-JS fallback is light.
front: comfortable # show deks on front-page story cells (compact hides them)
footer: "Filed while you slept." # left imprint on every page. Unset -> "A Nightly Build paper"

# Trusted external libraries (owner-authored on main, https + Subresource-
# Integrity-pinned; docs/customization.md). The engine ships the code
# listing's highlighter itself, python and javascript included, so most
# papers declare nothing here. This paper teaches CUDA, so it pins its own
# Prism chain to add C and C++: a press-declared copy outranks the
# engine's, and language components build on this core (order matters:
# core first, c/cpp on clike).
assets:
  scripts:
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js
      integrity: sha384-MXybTpajaBV0AkcBaCPT4KIvo0FzoCiWXgcihYsw4FUkEz0Pv3JGV6tk2G8vJtDc
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js
      integrity: sha384-7LHwxHIDSHTBleLmgDWZbC/IMJsfYfFVOihKhvsrxYW4j47YQcRwZja4ToFE3bA8
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js
      integrity: sha384-gaD4ncierlmWk42Z3BmTp37/z+Dqt8V4Wf74UjTvFeo+M+SgnEI6Ysd98pWhksQv
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js
      integrity: sha384-NiOrAquf32LSG3Vuig99LKS03EZPUuM8a51NOp+XXsqx08hUVo3wbNWALY7K/2J8
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js
      integrity: sha384-WJdEkJKrbsqw0evQ4GB6mlsKe5cGTxBOw4KAEIa52ZLB7DDpliGkwdme/HMa5n1m

# The Nightly Build directory. You are listed automatically at
# the-nightly-build.github.io. The public URL comes from your GitHub Pages URL,
# never from this file. The description is one line on your card, and optional.
directory:
  description: "AI, markets, engineering, and whatever I cannot stop thinking about."
