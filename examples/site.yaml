title: "The Nightly Build"
theme: press/themes/newsroom.css # the palette; furniture rides alongside it (press/furniture/ + each template folder)
appearance: auto # auto | light | dark. auto follows the system; base/no-JS fallback is light.
front: comfortable # show deks on front-page story cells (compact hides them)
footer: "Filed while you slept." # left imprint on every page; unset -> "A Nightly Build paper"

# Trusted external libraries this site loads on every page, to power its
# furniture. Here: Prism, which syntax-highlights the code blocks in the
# Kernels and Inference Stack sections. This is how a site uses a real JS library
# without any engine change: declare it here (owner-authored on main), and the
# build injects it into every page; articles stay script-free. Every entry is
# version-pinned and Subresource-Integrity-hashed (validate_config requires the
# hash), so the browser refuses a tampered CDN response. Order matters: Prism
# language components load after its core, and c/cpp build on clike.
assets:
  scripts:
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js
      integrity: sha384-MXybTpajaBV0AkcBaCPT4KIvo0FzoCiWXgcihYsw4FUkEz0Pv3JGV6tk2G8vJtDc
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js
      integrity: sha384-7LHwxHIDSHTBleLmgDWZbC/IMJsfYfFVOihKhvsrxYW4j47YQcRwZja4ToFE3bA8
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js
      integrity: sha384-gaD4ncierlmWk42Z3BmTp37/z+Dqt8V4Wf74UjTvFeo+M+SgnEI6Ysd98pWhksQv
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js
      integrity: sha384-NiOrAquf32LSG3Vuig99LKS03EZPUuM8a51NOp+XXsqx08hUVo3wbNWALY7K/2J8
    - url: https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js
      integrity: sha384-WJdEkJKrbsqw0evQ4GB6mlsKe5cGTxBOw4KAEIa52ZLB7DDpliGkwdme/HMa5n1m

# Morning email delivery (also requires the MAIL_* repo secrets; see
# docs/delivery.md). Without this block, the Atom feed is the push channel.
# email:
#   send_utc_hour: 12

# The Nightly Build directory. You are listed automatically at
# the-nightly-build.github.io; the public URL is derived from your GitHub Pages
# URL, never set here. Add an optional one-line description for your card, or set
# publish: false to opt out entirely.
directory:
  description: "AI, markets, engineering, and whatever I cannot stop thinking about."
# To opt out of the directory, uncomment:
# directory:
#   publish: false
